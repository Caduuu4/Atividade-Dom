<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>DOM: Página Interativa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>DOM: Página Interativa com JavaScript</h1>


  <section>
    <button id="incrementar">Incrementar</button>
    <button id="decrementar">Decrementar</button>
    <p id="contador">0</p>
  </section>


  <section>
    <input type="text" id="inputTexto" placeholder="Digite algo...">
    <p id="charCount">0 caracteres</p>
    <div id="mensagens"></div>
  </section>

  
  <section>
    <label>Escolha o tipo de lista:</label>
    <select id="tipoLista">
      <option value="ul">Lista Não Ordenada</option>
      <option value="ol">Lista Ordenada</option>
    </select>
    <button id="addLista">Adicionar Lista</button>
    <div id="listas"></div>
  </section>

  <section>
    <button id="reset">Resetar Tudo</button>
  </section>

  <script src="script.js"></script>
</body>
</html>
